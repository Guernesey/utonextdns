name: Update UT1 NextDNS Lists

on:
  schedule:
    - cron: "22 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write configuration (.env)
        run: |
          cat <<'EOF' > .env
          bundles:
            - name: Adult
              categories:
                - adult
            - name: Sensitive
              categories:
                - agressif
                - drogue
                - lingerie
                - sexual_education
                - dating
                - celebrity
                - mixed_adult
            - name: Actuality
              categories:
                - press
                - radio
                - fakenews
                - sports
            - name: Financial
              categories:
                - financial
                - bitcoin
                - cryptojacking
            - name: Shopping
              categories:
                - shopping
                - ads
                - marketing

          github:
            owner: Guernesey
            repo: utonextdns
            branch: main

          git:
            auto_commit: true
            commit_message: "chore: update UT1 NextDNS lists"
          EOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Generate lists
        run: python update_lists.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist metadata.json ut1*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update UT1 NextDNS lists"
          git push
